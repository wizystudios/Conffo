name: Security Regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rls-and-moderation:
    name: RLS + admin endpoint regression
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Verify required secrets are present
        run: |
          : "${VITE_SUPABASE_URL:?missing}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?missing}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?missing}"
      - name: RLS regression tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/_rls_tests/rls_test.ts
      - name: admin-moderate E2E
        run: deno test --allow-net --allow-env --allow-read supabase/functions/admin-moderate/index_test.ts
      - name: admin-reset-password E2E
        run: deno test --allow-net --allow-env --allow-read supabase/functions/admin-reset-password/index_test.ts

  vitest:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile
      - run: bunx vitest run

  supabase-linter:
    name: Supabase linter (security scan)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Skip if secrets missing
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Link project
        if: steps.gate.outputs.skip != 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Run linter
        if: steps.gate.outputs.skip != 'true'
        run: supabase db lint --level warning
