name: Edge Function Tests

on:
  push:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/edge-tests.yml"
  pull_request:
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  delete-account:
    name: delete-account (re-auth + full wipe)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Verify required secrets are present
        run: |
          : "${VITE_SUPABASE_URL:?missing}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?missing}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?missing}"

      - name: Run delete-account tests
        run: |
          deno test \
            --allow-net --allow-env --allow-read \
            supabase/functions/delete-account/index_test.ts
